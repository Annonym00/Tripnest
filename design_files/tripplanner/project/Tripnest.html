// Phone wrapper — uses the IOSDevice frame, dark theme
function Phone({ children, w = 390, h = 844 }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 52,
      background: '#000',
      padding: 12, boxSizing: 'border-box',
      boxShadow: '0 40px 80px rgba(15,5,35,0.45), 0 0 0 1px rgba(167,139,250,0.18), inset 0 0 0 1px rgba(255,255,255,0.04)',
      position: 'relative',
    }}>
      <div style={{
        width: '100%', height: '100%',
        borderRadius: 42, overflow: 'hidden', position: 'relative',
        background: '#0e0620',
      }}>
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 32, borderRadius: 24, background: '#000', zIndex: 60,
        }}/>
        {children}
        {/* home indicator */}
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 130, height: 4, borderRadius: 100, background: 'rgba(255,255,255,0.55)', zIndex: 70, pointerEvents: 'none',
        }}/>
      </div>
    </div>
  );
}

// Interactive "Main" mini-app for the focused/standalone artboard
function MainApp() {
  const [route, setRoute] = useState('home');
  const onNav = (r) => {
    if (r === 'add') setRoute('add');
    else if (r === 'home') setRoute('home');
    else if (r === 'trips') setRoute('trips');
    else if (r === 'budget') setRoute('budget');
    else if (r === 'profile') setRoute('profile');
    else if (r === 'trip') setRoute('trip');
  };
  const screen =
    route === 'home' ? <HomeScreen onNav={onNav}/> :
    route === 'trips' ? <TripsScreen onNav={onNav}/> :
    route === 'trip' ? <TripDetailScreen onNav={onNav}/> :
    route === 'budget' ? <BudgetScreen onNav={onNav}/> :
    route === 'profile' ? <ProfileScreen onNav={onNav}/> :
    route === 'add' ? <AddExpenseScreen onNav={() => setRoute('home')}/> :
    <HomeScreen onNav={onNav}/>;
  return screen;
}
